<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的專屬照片抽卡機！</title>
    <style>
        /* 整體樣式 */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        h1 { margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .subtitle { color: #e0e0e0; margin-bottom: 25px; }

        /* 按鈕樣式 */
        .btn-container { margin-bottom: 30px; }
        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background: #ffeb3b;
            color: #333;
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(255,235,59,0.4);
            transition: transform 0.2s, background 0.2s;
        }
        button:hover { background: #fff176; transform: scale(1.05); }
        button:active { transform: scale(0.95); }

        /* 卡牌容器 */
        .card-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 3D 翻牌特效 CSS */
        .card-flip {
            perspective: 1000px;
            width: 160px;
            height: 240px;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        /* 控制翻轉的 Class */
        .card-flip.revealed .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 3px solid #fff;
        }
        /* 卡牌背面（還沒翻開時） */
        .card-back {
            background: linear-gradient(45deg, #f44336, #ff9800);
            color: white;
            font-size: 24px;
            font-weight: bold;
        }
        /* 卡牌正面（翻開後） */
        .card-front {
            background: white;
            color: #333;
            transform: rotateY(180deg);
        }
        .card-front img {
            width: 100%;
            height: 75%;
            object-fit: cover; /* 讓照片自動填滿 */
        }
        .card-info {
            height: 25%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            background: #f9f9f9;
        }
        .card-name { font-weight: bold; font-size: 14px; }
        .card-rarity { font-size: 12px; margin-top: 2px; padding: 2px 8px; border-radius: 10px; color: white; }

        /* 不同稀有度的邊框與標籤顏色 */
        .SSR { border-color: #ffd700 !important; }
        .SSR .card-rarity { background: #ff9800; }
        .SR { border-color: #ba68c8 !important; }
        .SR .card-rarity { background: #9c27b0; }
        .R { border-color: #4fc3f7 !important; }
        .R .card-rarity { background: #03a9f4; }
    </style>
</head>
<body>

    <h1>✨ 歐皇檢定照片抽卡機 ✨</h1>
    <p class="subtitle">點擊下方按鈕開始抽卡，點擊卡片可以翻面喔！</p>

    <div class="btn-container">
        <button onclick="drawPack(1)">單抽</button>
        <button onclick="drawPack(5)" style="margin-left: 10px;">五連抽</button>
    </div>

    <div class="card-container" id="displayArea"></div>

<script>
// ==================== 【自訂你的照片池】 ====================
// 請把下面的圖片檔名，改成你資料夾裡的照片檔名！
const cardDatabase = [
    // R 級卡片 (出現機率高)
    { name: "我家路邊的貓", rarity: "R", image: "cat.jpg" },
    { name: "隔壁的柴犬", rarity: "R", image: "dog.png" },

    // SR 級卡片 (出現機率中)
    { name: "朋友的黑歷史", rarity: "SR", image: "friend1.jpg" },
    
    // SSR 級卡片 (極度稀有)
    { name: "究極閃卡．我自己", rarity: "SSR", image: "me.jpg" }
];

// 設定稀有度的隨機機率 (總和需為 1)
const rarityChances = [
    { rarity: "R", chance: 0.70 },   // 70% 機率
    { rarity: "SR", chance: 0.25 },  // 25% 機率
    { rarity: "SSR", chance: 0.05 }  // 5% 機率
];
// ==========================================================

// 核心抽卡演算法
function getOneCard() {
    const rand = Math.random();
    let cumulativeChance = 0;
    let rolledRarity = "R";

    for (let i = 0; i < rarityChances.length; i++) {
        cumulativeChance += rarityChances[i].chance;
        if (rand < cumulativeChance) {
            rolledRarity = rarityChances[i].rarity;
            break;
        }
    }

    // 從符合該稀有度的陣列中隨機挑選一張
    const pool = cardDatabase.filter(card => card.rarity === rolledRarity);
    // 防呆：如果該稀有度沒設定照片，就隨機抓一張
    if(pool.length === 0) return cardDatabase[Math.floor(Math.random() * cardDatabase.length)];
    
    return pool[Math.floor(Math.random() * pool.length)];
}

// 觸發開包
function drawPack(num) {
    const area = document.getElementById("displayArea");
    area.innerHTML = ""; // 清空上一輪

    for (let i = 0; i < num; i++) {
        const cardData = getOneCard();

        // 建立 3D 翻牌 HTML 結構
        const cardFlip = document.createElement("div");
        cardFlip.className = "card-flip";
        
        // 點擊卡片可以翻轉
        cardFlip.onclick = function() {
            this.classList.toggle("revealed");
        };

        cardFlip.innerHTML = `
            <div class="card-inner">
                <div class="card-back">？</div>
                <div class="card-front ${cardData.rarity}">
                    <img src="${cardData.image}" alt="${cardData.name}" onerror="this.src='https://via.placeholder.com/160x180?text=圖片路徑錯誤'">
                    <div class="card-info">
                        <div class="card-name">${cardData.name}</div>
                        <span class="card-rarity">${cardData.rarity}</span>
                    </div>
                </div>
            </div>
        `;
        
        area.appendChild(cardFlip);

        // 動態延遲翻開，做出一個接一個翻牌的效果
        setTimeout(() => {
            cardFlip.classList.add("revealed");
        }, i * 200); 
    }
}
</script>

</body>
</html>
